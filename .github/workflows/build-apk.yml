name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: npm install
      - run: npm run build:server
      - run: npm run build:client

      - name: Fix gradle wrapper
        working-directory: packages/client/android
        run: |
          sed -i 's|distributionUrl=file.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.14.3-all.zip|' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Build APK
        working-directory: packages/client/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: campus-forum-debug.apk
          path: packages/client/android/app/build/outputs/apk/debug/app-debug.apk
