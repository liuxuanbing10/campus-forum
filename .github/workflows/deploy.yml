name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npm run build:server
      - run: npm run build:client

      - name: Package dist
        run: |
          tar -czf deploy.tar.gz \
            packages/client/dist \
            packages/server/dist \
            packages/core/dist \
            packages/database/dist \
            plugins/teams/dist \
            plugins/admin/dist \
            plugins/auth/dist \
            plugins/boards/dist \
            plugins/export/dist \
            plugins/messages/dist \
            plugins/notifications/dist \
            plugins/posts/dist \
            plugins/rss/dist \
            plugins/search/dist \
            plugins/social/dist \
            plugins/theme-default/dist

      - name: Upload & extract
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: /opt/campus-forum/
          strip_components: 0

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/campus-forum
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz
            npx pm2 restart campus-forum || npx pm2 start packages/server/dist/index.js --name campus-forum
