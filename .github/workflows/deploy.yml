name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npm run build:server
      - run: npm run build:client

      - name: Deploy dist files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "packages/client/dist/*,packages/server/dist/*,packages/core/dist/*,packages/database/dist/*,plugins/*/dist/*"
          target: /opt/campus-forum
          strip_components: 0

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/campus-forum
            npx pm2 restart campus-forum || npx pm2 start packages/server/dist/index.js --name campus-forum
