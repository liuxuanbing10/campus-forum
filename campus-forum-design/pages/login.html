<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 校园论坛</title>
    <style id="theme-vars">
/* Campus Forum — Brand Design System */
/* Tone: Clean White & Literary, Poetic Serif */

@import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');

:root {
  /* === Primary Color: Teal Green === */
  --color-primary-50: #f0fdfa;
  --color-primary-100: #ccfbf1;
  --color-primary-200: #99f6e4;
  --color-primary-300: #5eead4;
  --color-primary-400: #2dd4bf;
  --color-primary-500: #14b8a6;
  --color-primary-600: #0d9488;
  --color-primary-700: #0f766e;
  --color-primary-800: #115e59;
  --color-primary-900: #134e4a;
  /* Primary as CSS variable for direct use */
  --color-primary: var(--color-primary-600);

  /* === Surface Colors — Pure White Theme === */
  --color-bg: #ffffff;
  --color-bg-alt: #fafaf9;
  --color-surface: #ffffff;
  --color-surface-hover: #f0fdfa;
  --color-border: #e7e5e4;
  --color-border-light: #f5f5f4;

  /* === Text Colors === */
  --color-text-primary: #1c1917;
  --color-text-secondary: #57534e;
  --color-text-tertiary: #a8a29e;
  --color-text-inverse: #ffffff;

  /* === State Colors === */
  --state-success: #16a34a;
  --state-warning: #d97706;
  --state-error: #dc2626;
  --state-info: #0284c7;

  /* === Typography — Literary Serif Stack === */
  --font-display: 'LXGW WenKai TC', 'Noto Serif SC', 'STSong', Georgia, serif;
  --font-body: 'Noto Serif SC', 'Noto Serif', 'Crimson Pro', Georgia, 'Times New Roman', serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;

  /* Type Scale */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  /* Font Weights */
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Line Heights */
  --leading-tight: 1.25;
  --leading-snug: 1.375;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* === Radius Scale === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* === Spacing === */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;

  /* === Shadow (alpha <= 0.05 for static) === */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.06);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.08);

  /* === Transition === */
  --transition-fast: 150ms ease;
  --transition-normal: 200ms ease;
  --transition-slow: 300ms ease;
}

/* Typography Classes */
.campus-h1 {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  font-weight: var(--weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-text-primary);
}

.campus-h2 {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  color: var(--color-text-primary);
}

.campus-h3 {
  font-family: var(--font-body);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  color: var(--color-text-primary);
}

.campus-h4 {
  font-family: var(--font-body);
  font-size: var(--text-lg);
  font-weight: var(--weight-medium);
  line-height: var(--leading-normal);
  color: var(--color-text-primary);
}

.campus-body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: var(--weight-normal);
  line-height: var(--leading-normal);
  color: var(--color-text-primary);
}

.campus-caption {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-normal);
  line-height: var(--leading-relaxed);
  color: var(--color-text-secondary);
}

.campus-overline {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-normal);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--color-text-tertiary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--color-bg);color:var(--color-text-primary);">

<!-- Project Shell Header -->
<header style="position:sticky;top:0;z-index:40;background:var(--color-surface);border-bottom:1px solid var(--color-border);">
  <div style="max-width:72rem;margin:0 auto;padding:0 var(--space-6);display:flex;align-items:center;justify-content:space-between;height:64px;">
    <a href="pages/home.html" style="display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--color-text-primary);font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-bold);letter-spacing:-0.01em;flex-shrink:0;">
      <span style="font-size:1.5rem;line-height:1;">&#127891;</span>
      <span>校园论坛</span>
    </a>
    <nav style="display:flex;align-items:center;gap:var(--space-8);flex-shrink:0;">
      <a href="pages/home.html"
         data-nav-key="home"
         data-active-nav
         style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);text-decoration:none;padding:var(--space-2) 0;border-bottom:2px solid transparent;transition:color var(--transition-fast),border-color var(--transition-fast);"
         onmouseover="this.style.color='var(--color-text-primary)'"
         onmouseout="if(!this.hasAttribute('data-active'))this.style.color='var(--color-text-secondary)'">
        首页
      </a>
    </nav>
    <div style="display:flex;align-items:center;gap:var(--space-3);flex-shrink:0;">
      <div data-dom-id="auth-buttons" style="display:flex;align-items:center;gap:var(--space-3);">
        <a href="pages/login.html"
           data-dom-id="nav-login"
           style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-md);text-decoration:none;transition:color var(--transition-fast),border-color var(--transition-fast),background var(--transition-fast);"
           onmouseover="this.style.color='var(--color-text-primary)';this.style.borderColor='var(--color-text-tertiary)'"
           onmouseout="this.style.color='var(--color-text-secondary)';this.style.borderColor='var(--color-border)'">
          登录
        </a>
        <a href="pages/register.html"
           data-dom-id="nav-register"
           style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--color-text-inverse);background:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-md);text-decoration:none;transition:opacity var(--transition-fast),transform var(--transition-fast);"
           onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
          注册
        </a>
      </div>
      <a href="pages/new-post.html"
         data-dom-id="cta-new-post"
         style="display:none;inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--color-text-inverse);background:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-md);text-decoration:none;transition:opacity var(--transition-fast),transform var(--transition-fast);"
         onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'"
         onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
        发帖
      </a>
      <div data-dom-id="user-info" style="display:none;align-items:center;gap:var(--space-3);">
        <span data-dom-id="user-display-name" style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-primary);"></span>
        <button data-dom-id="nav-logout"
                style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;transition:color var(--transition-fast),border-color var(--transition-fast),background var(--transition-fast);"
                onmouseover="this.style.color='var(--color-text-primary)';this.style.borderColor='var(--color-text-tertiary)'"
                onmouseout="this.style.color='var(--color-text-secondary)';this.style.borderColor='var(--color-border)'">
          退出
        </button>
      </div>
    </div>
  </div>
  <style>
    [data-nav-key][data-active="true"] {
      color: var(--color-primary) !important;
      border-bottom-color: var(--color-primary) !important;
      font-weight: var(--weight-semibold) !important;
    }
  </style>
</header>

<main>
  <!-- Login Page: Centered Card -->
  <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:var(--space-6);">

    <div style="width:100%;max-width:420px;background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:var(--space-10) var(--space-8);">

      <!-- Literary Ornament: two thin teal lines with centered diamond -->
      <div style="display:flex;align-items:center;justify-content:center;gap:var(--space-3);margin-bottom:var(--space-6);">
        <span style="flex:1;height:1px;background:var(--color-primary);"></span>
        <span style="color:var(--color-primary);font-size:var(--text-sm);line-height:1;">&#9670;</span>
        <span style="flex:1;height:1px;background:var(--color-primary);"></span>
      </div>

      <!-- Heading -->
      <div style="text-align:center;margin-bottom:var(--space-6);">
        <h2 style="font-family:var(--font-display);font-size:var(--text-3xl);font-weight:var(--weight-semibold);line-height:var(--leading-snug);color:var(--color-text-primary);margin:0 0 var(--space-2) 0;">欢迎回来</h2>
        <p style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-normal);line-height:var(--leading-normal);color:var(--color-text-secondary);margin:0;">登录你的校园论坛账号</p>
      </div>

      <!-- Error Message Area -->
      <div data-dom-id="login-error" style="display:none;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.15);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-5);">
        <p style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--state-error);margin:0;">用户名或密码错误</p>
      </div>

      <!-- Login Form -->
      <form data-dom-id="login-form" style="display:flex;flex-direction:column;gap:var(--space-4);">

        <!-- Username Field -->
        <div>
          <label for="login-username" style="display:block;font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-2);">用户名</label>
          <input type="text" id="login-username" name="username" placeholder="请输入用户名" autocomplete="username" required
                 style="width:100%;height:48px;padding:0 var(--space-4);font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text-primary);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none;transition:border-color var(--transition-fast),box-shadow var(--transition-fast);box-sizing:border-box;"
                 onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 2px rgba(13,148,136,0.2)'"
                 onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'">
        </div>

        <!-- Password Field -->
        <div>
          <label for="login-password" style="display:block;font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-2);">密码</label>
          <input type="password" id="login-password" name="password" placeholder="请输入密码" autocomplete="current-password" required
                 style="width:100%;height:48px;padding:0 var(--space-4);font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text-primary);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none;transition:border-color var(--transition-fast),box-shadow var(--transition-fast);box-sizing:border-box;"
                 onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 2px rgba(13,148,136,0.2)'"
                 onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'">
        </div>

        <!-- Submit Button -->
        <button type="submit"
                style="width:100%;height:48px;padding:0 var(--space-6);font-family:var(--font-body);font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--color-text-inverse);background:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-md);cursor:pointer;transition:opacity var(--transition-fast),transform var(--transition-fast);margin-top:var(--space-2);"
                onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'"
                onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
          登录
        </button>
      </form>

      <!-- Register Link -->
      <div style="text-align:center;margin-top:var(--space-6);font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text-secondary);">
        没有账号？<a href="pages/register.html" data-dom-id="cta-register" style="font-weight:var(--weight-medium);color:var(--color-primary);text-decoration:none;transition:opacity var(--transition-fast);" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">注册</a>
      </div>

    </div>
  </div>
</main>

<script>lucide.createIcons();</script>
</body>
</html>
