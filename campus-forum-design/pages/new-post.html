<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发表新帖 - 校园论坛</title>
    <style id="theme-vars">
/* Campus Forum — Brand Design System */
/* Tone: Clean White & Literary, Poetic Serif */

@import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');

:root {
  /* === Primary Color: Teal Green === */
  --color-primary-50: #f0fdfa;
  --color-primary-100: #ccfbf1;
  --color-primary-200: #99f6e4;
  --color-primary-300: #5eead4;
  --color-primary-400: #2dd4bf;
  --color-primary-500: #14b8a6;
  --color-primary-600: #0d9488;
  --color-primary-700: #0f766e;
  --color-primary-800: #115e59;
  --color-primary-900: #134e4a;
  /* Primary as CSS variable for direct use */
  --color-primary: var(--color-primary-600);

  /* === Surface Colors — Pure White Theme === */
  --color-bg: #ffffff;
  --color-bg-alt: #fafaf9;
  --color-surface: #ffffff;
  --color-surface-hover: #f0fdfa;
  --color-border: #e7e5e4;
  --color-border-light: #f5f5f4;

  /* === Text Colors === */
  --color-text-primary: #1c1917;
  --color-text-secondary: #57534e;
  --color-text-tertiary: #a8a29e;
  --color-text-inverse: #ffffff;

  /* === State Colors === */
  --state-success: #16a34a;
  --state-warning: #d97706;
  --state-error: #dc2626;
  --state-info: #0284c7;

  /* === Typography — Literary Serif Stack === */
  --font-display: 'LXGW WenKai TC', 'Noto Serif SC', 'STSong', Georgia, serif;
  --font-body: 'Noto Serif SC', 'Noto Serif', 'Crimson Pro', Georgia, 'Times New Roman', serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;

  /* Type Scale */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  /* Font Weights */
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Line Heights */
  --leading-tight: 1.25;
  --leading-snug: 1.375;
  --leading-normal: 1.6;
  --leading-relaxed: 1.75;

  /* === Radius Scale === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* === Spacing === */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;

  /* === Shadow (alpha <= 0.05 for static) === */
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.06);
  --shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.08);

  /* === Transition === */
  --transition-fast: 150ms ease;
  --transition-normal: 200ms ease;
  --transition-slow: 300ms ease;
}

/* Typography Classes */
.campus-h1 {
  font-family: var(--font-display);
  font-size: var(--text-4xl);
  font-weight: var(--weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-text-primary);
}

.campus-h2 {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  color: var(--color-text-primary);
}

.campus-h3 {
  font-family: var(--font-body);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  color: var(--color-text-primary);
}

.campus-h4 {
  font-family: var(--font-body);
  font-size: var(--text-lg);
  font-weight: var(--weight-medium);
  line-height: var(--leading-normal);
  color: var(--color-text-primary);
}

.campus-body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: var(--weight-normal);
  line-height: var(--leading-normal);
  color: var(--color-text-primary);
}

.campus-caption {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-normal);
  line-height: var(--leading-relaxed);
  color: var(--color-text-secondary);
}

.campus-overline {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-normal);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--color-text-tertiary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

<!-- ===== Shared Header (project-shell fragment) ===== -->
<header style="position:sticky;top:0;z-index:40;background:var(--color-surface);border-bottom:1px solid var(--color-border);">
  <div style="max-width:72rem;margin:0 auto;padding:0 var(--space-6);display:flex;align-items:center;justify-content:space-between;height:64px;">

    <!-- Logo -->
    <a href="home.html" style="display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--color-text-primary);font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-bold);letter-spacing:-0.01em;flex-shrink:0;">
      <span style="font-size:1.5rem;line-height:1;">&#127891;</span>
      <span>校园论坛</span>
    </a>

    <!-- Center: Navigation Links -->
    <nav style="display:flex;align-items:center;gap:var(--space-8);flex-shrink:0;">
      <a href="home.html"
         data-nav-key="home"
         data-active="true"
         style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);text-decoration:none;padding:var(--space-2) 0;border-bottom:2px solid transparent;transition:color var(--transition-fast),border-color var(--transition-fast);"
         onmouseover="this.style.color='var(--color-text-primary)'"
         onmouseout="if(!this.hasAttribute('data-active'))this.style.color='var(--color-text-secondary)'">
        首页
      </a>
    </nav>

    <!-- Right: Logged-in state -->
    <div style="display:flex;align-items:center;gap:var(--space-3);flex-shrink:0;">

      <!-- Auth buttons (hidden — logged-in) -->
      <div data-dom-id="auth-buttons" style="display:none;align-items:center;gap:var(--space-3);">
        <a href="login.html"
           data-dom-id="nav-login"
           style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-md);text-decoration:none;transition:color var(--transition-fast),border-color var(--transition-fast),background var(--transition-fast);"
           onmouseover="this.style.color='var(--color-text-primary)';this.style.borderColor='var(--color-text-tertiary)'"
           onmouseout="this.style.color='var(--color-text-secondary)';this.style.borderColor='var(--color-border)'">
          登录
        </a>
        <a href="register.html"
           data-dom-id="nav-register"
           style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--color-text-inverse);background:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-md);text-decoration:none;transition:opacity var(--transition-fast),transform var(--transition-fast);"
           onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
          注册
        </a>
      </div>

      <!-- New post CTA (visible — logged-in) -->
      <a href="new-post.html"
         data-dom-id="cta-new-post"
         style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--color-text-inverse);background:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-md);text-decoration:none;transition:opacity var(--transition-fast),transform var(--transition-fast);"
         onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'"
         onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
        发帖
      </a>

      <!-- User info area (visible — logged-in) -->
      <div data-dom-id="user-info" style="display:flex;align-items:center;gap:var(--space-3);">
        <span data-dom-id="user-display-name" style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-primary);">林小雨</span>
        <button data-dom-id="nav-logout"
                style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 var(--space-5);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);background:transparent;border:1px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;transition:color var(--transition-fast),border-color var(--transition-fast),background var(--transition-fast);"
                onmouseover="this.style.color='var(--color-text-primary)';this.style.borderColor='var(--color-text-tertiary)'"
                onmouseout="this.style.color='var(--color-text-secondary)';this.style.borderColor='var(--color-border)'">
          退出
        </button>
      </div>

    </div>
  </div>

  <!-- Active nav style injection -->
  <style>
    [data-nav-key][data-active="true"] {
      color: var(--color-primary) !important;
      border-bottom-color: var(--color-primary) !important;
      font-weight: var(--weight-semibold) !important;
    }
  </style>
</header>

<!-- ===== Page Content ===== -->
<main>
  <section style="max-width:42rem;margin:0 auto;padding:var(--space-10) var(--space-6) var(--space-16) var(--space-6);">

    <!-- Form Card -->
    <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-card);padding:var(--space-10);">

      <!-- Back Breadcrumb -->
      <a href="#"
         data-dom-id="back-board"
         style="display:inline-flex;align-items:center;gap:var(--space-1);font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-tertiary);text-decoration:none;margin-bottom:var(--space-6);transition:color var(--transition-fast);"
         onmouseover="this.style.color='var(--color-primary)'"
         onmouseout="this.style.color='var(--color-text-tertiary)'">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
        返回
      </a>

      <!-- Page Title -->
      <h2 class="campus-h2" style="margin-bottom:var(--space-8);font-size:clamp(22px,2.4vw,30px);text-wrap:balance;word-break:keep-all;overflow-wrap:break-word;">
        发表新帖
      </h2>

      <!-- Form -->
      <form style="display:flex;flex-direction:column;gap:var(--space-6);">

        <!-- Field 1: 选择板块 -->
        <div>
          <label for="board-select" style="display:block;font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-2);">选择板块</label>
          <select id="board-select"
                  style="display:block;width:100%;height:48px;padding:0 var(--space-4);font-family:var(--font-body);font-size:var(--text-base);font-weight:var(--weight-normal);color:var(--color-text-primary);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none;appearance:none;background-image:url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2716%27 height=%2716%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23a8a29e%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3E%3Cpolyline points=%276 9 12 15 18 9%27%3E%3C/polyline%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right var(--space-4) center;cursor:pointer;transition:border-color var(--transition-fast),box-shadow var(--transition-fast);"
                  onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 2px var(--color-primary-200)'"
                  onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'">
            <option value="" disabled selected>请选择板块</option>
            <option value="treehole">&#127794; 树洞</option>
            <option value="course">&#128218; 课程交流</option>
            <option value="secondhand">&#128230; 二手/失物</option>
            <option value="life">&#127881; 校园生活</option>
            <option value="tech">&#128187; 技术交流</option>
          </select>
        </div>

        <!-- Field 2: 帖子标题 -->
        <div>
          <label for="post-title" style="display:block;font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-2);">帖子标题</label>
          <input type="text"
                 id="post-title"
                 placeholder="给你的帖子起个标题"
                 style="display:block;width:100%;height:48px;padding:0 var(--space-4);font-family:var(--font-body);font-size:var(--text-base);font-weight:var(--weight-normal);color:var(--color-text-primary);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none;transition:border-color var(--transition-fast),box-shadow var(--transition-fast);"
                 onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 2px var(--color-primary-200)'"
                 onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'" />
        </div>

        <!-- Field 3: 帖子内容 -->
        <div>
          <label for="post-content" style="display:block;font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-2);">帖子内容</label>
          <textarea id="post-content"
                    placeholder="写下你想分享的内容..."
                    style="display:block;width:100%;min-height:200px;padding:var(--space-4);font-family:var(--font-body);font-size:var(--text-base);font-weight:var(--weight-normal);line-height:var(--leading-normal);color:var(--color-text-primary);background:var(--color-primary-50);border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none;resize:vertical;transition:border-color var(--transition-fast),box-shadow var(--transition-fast);"
                    onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 2px var(--color-primary-200)'"
                    onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'"></textarea>
        </div>

        <!-- Anonymous Toggle -->
        <label style="display:flex;align-items:center;gap:var(--space-3);cursor:pointer;">
          <input type="checkbox"
                 style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;accent-color:var(--color-primary);cursor:pointer;" />
          <span style="font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--weight-normal);color:var(--color-text-secondary);">匿名发帖</span>
        </label>

        <!-- Submit Button -->
        <button type="submit"
                style="display:flex;align-items:center;justify-content:center;width:100%;height:48px;padding:0 var(--space-6);font-family:var(--font-body);font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--color-text-inverse);background:var(--color-primary);border:1px solid var(--color-primary);border-radius:var(--radius-md);cursor:pointer;transition:opacity var(--transition-fast),transform var(--transition-fast);"
                onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'"
                onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'">
          发布
        </button>

      </form>
    </div>

  </section>
</main>

<script>lucide.createIcons();</script>
</body>
</html>
