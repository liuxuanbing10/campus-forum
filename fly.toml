app = "campus-forum-liuxuanbing"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

# 持久化数据卷（SQLite 数据库 + 上传文件）
[[mounts]]
  source = "forum_data"
  destination = "/app/data"

# 免费额度配置：256MB 内存
[[vm]]
  memory = 256
  cpu_kind = "shared"
  cpus = 1
