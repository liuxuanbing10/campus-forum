[build]
  command = "npm run build && cp -r packages/server/dist netlify/functions/server-dist"
  publish = "packages/client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
