[build]
  command = "npm run build:server && npx esbuild netlify/functions/api.ts --bundle --platform=node --format=esm --outfile=netlify/functions/api.mjs --external:libsql --external:@libsql/linux-x64-gnu --external:@libsql/win32-x64-msvc --external:@libsql/darwin-x64 --external:@libsql/darwin-arm64 && npm run build:client"
  publish = "packages/client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
