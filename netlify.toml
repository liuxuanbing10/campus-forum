[build]
  command = "npm install -g pnpm && pnpm install --no-optional --ignore-scripts && pnpm --filter @campus-forum/client run build"
  publish = "packages/client/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
